blueprint:
  name: Linked Analog Entities (Simple)
  description: >-
    Keep two analog entities in sync.
    Triggering is based on state changes only.
    Supports sensor, number, and input_number as selectable entities.
    Writes are only sent to writable targets (number/input_number).
    Supports bidirectional conversion using one multiplier.
    No debounce logic.
  domain: automation
  author: ha-blueprints
  input:
    entity_a:
      name: Entity A
      description: First entity to link.
      selector:
        entity:
          filter:
            domain:
              - sensor
              - number
              - input_number
    entity_b:
      name: Entity B
      description: Second entity to link.
      selector:
        entity:
          filter:
            domain:
              - sensor
              - number
              - input_number
    tolerance:
      name: Tolerance
      description: >-
        Minimum numeric difference required before writing.
        Use 0 for exact mirroring.
      default: 0
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          mode: box
    multiplier_a_to_b:
      name: Multiplier A to B
      description: >-
        Conversion factor from A to B.
        A -> B uses target = source * multiplier.
        B -> A uses target = source / multiplier.
      default: 1.0
      selector:
        number:
          min: -1000000
          max: 1000000
          step: 0.001
          mode: box
    clamp_to_target_range:
      name: Clamp To Target Range
      description: >-
        If enabled, values are clamped to target min/max before writing.
        Prevents out_of_range errors on number/input_number entities.
      default: true
      selector:
        boolean:

mode: single
max_exceeded: silent

variables:
  a_entity: !input entity_a
  b_entity: !input entity_b
  tolerance: !input tolerance
  multiplier_a_to_b: !input multiplier_a_to_b
  clamp_to_target_range: !input clamp_to_target_range

trigger:
  - platform: state
    id: from_a
    entity_id: !input entity_a
  - platform: state
    id: from_b
    entity_id: !input entity_b

action:
  - variables:
      source_entity: "{{ trigger.entity_id }}"
      target_entity: "{{ b_entity if trigger.entity_id == a_entity else a_entity }}"
      is_from_a: "{{ trigger.entity_id == a_entity }}"
      source_value: "{{ states(source_entity) | float(default=none) }}"
      target_value: "{{ states(target_entity) | float(default=none) }}"
      tolerance_value: "{{ tolerance | float(default=0) }}"
      multiplier_value: "{{ multiplier_a_to_b | float(default=1) }}"
      raw_target_value: >-
        {% if source_value is none %}
          {{ none }}
        {% elif is_from_a %}
          {{ source_value * multiplier_value }}
        {% elif multiplier_value != 0 %}
          {{ source_value / multiplier_value }}
        {% else %}
          {{ none }}
        {% endif %}
      target_min: "{{ state_attr(target_entity, 'min') | float(default=none) }}"
      target_max: "{{ state_attr(target_entity, 'max') | float(default=none) }}"
      target_is_writable: >-
        {{ target_entity.startswith('number.') or target_entity.startswith('input_number.') }}
      raw_target_in_range: >-
        {{
          raw_target_value is not none
          and (target_min is none or raw_target_value >= target_min)
          and (target_max is none or raw_target_value <= target_max)
        }}
      effective_value: >-
        {% set v = raw_target_value %}
        {% if v is none %}
          {{ none }}
        {% else %}
          {% set low = target_min if target_min is not none else v %}
          {% set high = target_max if target_max is not none else v %}
          {% if clamp_to_target_range %}
            {{ [ [v, low] | max, high ] | min }}
          {% else %}
            {{ v }}
          {% endif %}
        {% endif %}
      should_write: >-
        {{
          target_is_writable
          and effective_value is not none
          and (clamp_to_target_range or raw_target_in_range)
          and (target_value is none or (effective_value - target_value) | abs > tolerance_value)
        }}
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_write and target_entity.startswith('input_number.') }}"
        sequence:
          - service: input_number.set_value
            target:
              entity_id: "{{ target_entity }}"
            data:
              value: "{{ effective_value }}"
      - conditions:
          - condition: template
            value_template: "{{ should_write and target_entity.startswith('number.') }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ target_entity }}"
            data:
              value: "{{ effective_value }}"
